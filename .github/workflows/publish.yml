name: Publish image

# Builds the container image and pushes it to GHCR so the deployment host
# doesn't have to compile anything — it just pulls. See the deployment section
# of README.md for how the Portainer stack consumes this.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".cursorrules"
      - ".windsurfrules"
      - ".clinerules"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # Each architecture builds on a runner of that architecture and pushes an
  # untagged image by digest; the merge job below stitches them into one
  # multi-platform tag. Building arm64 on an amd64 runner would work via QEMU,
  # but emulating the npm/Vite stage takes an order of magnitude longer than
  # this — and arm64 runners are free for public repositories.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Derive a filename-safe platform slug
        run: echo "PLATFORM_SLUG=${{ matrix.platform }}" | tr '/' '-' >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          # Pushed by digest only — tags are applied once, on the merged
          # manifest, so a tag never points at a single-arch image.
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          # Scoped per platform so the two builds don't evict each other.
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ env.PLATFORM_SLUG }}
          path: /tmp/digests/*
          retention-days: 1
          if-no-files-found: error

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # `latest` is what the compose file tracks; the sha tag exists so a
          # specific build can be pinned or rolled back to by name.
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Create multi-platform manifest
        working-directory: /tmp/digests
        run: |
          # Word splitting is deliberate here: both substitutions expand into
          # multiple arguments (-t per tag, one ref per digest).
          # shellcheck disable=SC2046
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Verify both platforms are present
        run: |
          docker buildx imagetools inspect ${{ env.IMAGE }}:latest
          docker buildx imagetools inspect --raw ${{ env.IMAGE }}:latest \
            | jq -e '[.manifests[].platform | select(.architecture != "unknown")
                      | "\(.os)/\(.architecture)"] | sort
                     | . == ["linux/amd64","linux/arm64"]' > /dev/null
          echo "linux/amd64 and linux/arm64 both published" >> "$GITHUB_STEP_SUMMARY"
