services:
  tprint:
    # Prebuilt by .github/workflows/publish.yml on every push to main, so the
    # deployment host only pulls — it never compiles the frontend or installs
    # Python packages.
    #
    # Set TPRINT_TAG to a `sha-xxxxxxx` tag to pin or roll back to a specific
    # build; leave it unset to track the latest push to main.
    image: ghcr.io/toineenzo/tprint:${TPRINT_TAG:-latest}
    # `latest` is a moving tag, so without this the host would keep running
    # whatever it pulled the first time.
    pull_policy: always
    # To go back to building on the host instead, comment out the two lines
    # above and uncomment this:
    # build: .
    restart: unless-stopped
    environment:
      TZ: "${TZ:-Europe/Amsterdam}" # adjust to your timezone, used for snippet timestamps
      DEFAULT_LANGUAGE: "${DEFAULT_LANGUAGE:-en}" # "en" or "nl" — default UI language before a visitor picks one

      # --- Auth --- fill these in via Portainer's stack environment variables,
      # not by editing this file, so real secrets never end up committed.
      AUTH_ENABLED: "${AUTH_ENABLED:-true}" # set to "false" if you're gating access via Cloudflare Access instead
      APP_PASSWORD: "${APP_PASSWORD:?set APP_PASSWORD in the stack's environment variables}"
      SESSION_SECRET: "${SESSION_SECRET:?set SESSION_SECRET in the stack's environment variables}"
      PRINT_API_TOKEN: "${PRINT_API_TOKEN:?set PRINT_API_TOKEN in the stack's environment variables}"

      # --- Printer ---
      PRINTER_BACKEND: "${PRINTER_BACKEND:-file}" # "file" for the real printer, "dummy" for testing without hardware
      PRINTER_DEVICE: "${PRINTER_DEVICE:-/dev/usb/lp0}"
    volumes:
      - tprint-data:/data
    devices:
      # This only works if /dev/usb/lp0 already exists on the Docker host
      # (i.e. the LXC/VM this container runs in) — see the deployment guide
      # for how to pass the printer through to that host first.
      - "/dev/usb/lp0:/dev/usb/lp0"
    ports:
      # Host port is configurable in case 8000 is already taken by another
      # container on this Docker host — set HOST_PORT to override.
      - "${HOST_PORT:-8000}:8000"

volumes:
  tprint-data:
